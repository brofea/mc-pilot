services:
  qdrant:
    image: qdrant/qdrant:v1.15.3
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  app:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      MC_PILOT_HOST: 0.0.0.0
      MC_PILOT_PORT: 8000
      MC_PILOT_SQLITE_URL: sqlite:///data/mc_pilot.db
      MC_PILOT_QDRANT_URL: http://qdrant:6333
      MC_PILOT_GAME_LOG_PATH: /minecraft/logs/latest.log
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - app-data:/app/data
      - type: bind
        source: "${MC_PILOT_MINECRAFT_DIR:-${HOME}/Library/Application Support/minecraft}"
        target: /minecraft
        read_only: true
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=2)",
        ]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

volumes:
  app-data:
  qdrant-data:
