plugins {
    id "net.fabricmc.fabric-loom" version "1.17-SNAPSHOT"
}

group = "mc.pilot"
version = project.properties["mod_version"]

repositories {
    maven {
        name "Fabric"
        url "https://maven.fabricmc.net/"
    }
    maven {
        name "AliyunPublic"
        url "https://maven.aliyun.com/repository/public"
    }
    maven {
        name "AliyunCentral"
        url "https://maven.aliyun.com/repository/central"
    }
}

dependencies {
    minecraft "com.mojang:minecraft:${project.properties["minecraft_version"]}"
    implementation "net.fabricmc:fabric-loader:${project.properties["loader_version"]}"
    implementation "net.fabricmc.fabric-api:fabric-api:${project.properties["fabric_version"]}"
}

processResources {
    inputs.property "version", project.version
    filteringCharset "UTF-8"
    filesMatching("fabric.mod.json") {
        expand(
            "version": project.version,
            "minecraft_version": project.properties["minecraft_version"],
            "loader_version": project.properties["loader_version"],
        )
    }
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
    sourceCompatibility = JavaVersion.VERSION_25
    targetCompatibility = JavaVersion.VERSION_25
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = "UTF-8"
    options.release = 25
}
