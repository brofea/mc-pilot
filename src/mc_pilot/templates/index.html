{% extends "base.html" %}
{% block content %}
<section class="hero" aria-labelledby="pilot-title">
  <p class="eyebrow">Java Edition 26.2</p>
  <h1 id="pilot-title">Minecraft Pilot</h1>
  <p>你的本地 Minecraft 游戏助手。输入 <code>/pilot</code> 命令与 Agent 交互。</p>
</section>

<div class="main-layout">
  <section class="panel chat-panel" aria-labelledby="chat-title">
    <div class="panel-heading">
      <h2 id="chat-title">Pilot 对话</h2>
      <span class="status-pill" id="game-status" data-state="disconnected">未连接游戏</span>
      <span class="status-pill" id="api-status" data-state="connecting">检查中</span>
    </div>
    <div id="death-bubble" class="death-bubble" hidden aria-live="assertive"></div>
    <ol id="chat-log" class="chat-log" aria-live="polite">
      <li class="pilot-message">Pilot 已就位。输入消息或 <code>/pilot help</code> 查看帮助。</li>
    </ol>
    <form id="chat-form" class="chat-form" autocomplete="off">
      <label for="pilot-input">消息</label>
      <div class="input-row">
        <input id="pilot-input" name="message" placeholder="输入 /pilot 命令或问题…" autofocus>
        <button type="submit" id="send-btn">发送</button>
      </div>
    </form>
  </section>

  <section class="panel recipe-panel" aria-labelledby="recipe-title" id="recipe-section" hidden>
    <div class="panel-heading">
      <h2 id="recipe-title">配方树</h2>
      <button id="recipe-close-btn" class="small-btn" aria-label="关闭配方面板">关闭</button>
    </div>
    <div id="recipe-content" class="recipe-content"></div>
  </section>
</div>
{% endblock %}
{% block scripts %}
<script type="module" src="{{ url_for('static', path='/js/chat.js') }}"></script>
{% endblock %}
