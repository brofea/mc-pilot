{% extends "base.html" %}
{% block content %}
<div class="app-shell">
  <button class="sidebar-toggle" id="sidebar-toggle" aria-label="切换侧边栏">
    <span class="toggle-icon"></span>
  </button>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1 class="sidebar-logo">Minecraft Pilot</h1>
      <p class="sidebar-version">Java Edition 26.2</p>
    </div>

    <button class="new-chat-btn" id="new-chat-btn">+ 新对话</button>

    <div class="sidebar-section">
      <h2 class="sidebar-section-title">对话历史</h2>
      <div class="conversation-list" id="conversation-list"></div>
    </div>

    <div class="sidebar-section sidebar-status">
      <h2 class="sidebar-section-title">服务状态</h2>
      <div class="status-row">
        <span class="status-dot" id="api-dot" data-state="connecting"></span>
        <span id="api-status-text">检查中</span>
      </div>
      <div class="status-row">
        <span class="status-dot" id="game-dot" data-state="disconnected"></span>
        <span id="game-status-text">未连接游戏</span>
      </div>
      <div class="status-detail" id="game-detail" hidden>
        <span id="game-player"></span>
        <span id="game-version"></span>
      </div>
      <div class="status-row">
        <span class="status-dot" id="recipes-dot" data-state="connecting"></span>
        <span id="recipes-status-text">配方树算法</span>
      </div>
      <div class="status-row">
        <span class="status-dot" id="rag-dot" data-state="connecting"></span>
        <span id="rag-status-text">Wiki RAG</span>
      </div>
      <button class="reconnect-btn" id="reconnect-btn" title="重新扫描游戏日志">
        重连游戏日志
      </button>
    </div>

    <div class="sidebar-footer">
      <a href="/admin" class="sidebar-link">开发者后台</a>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebar-overlay" hidden></div>

  <main class="chat-main">
    <div class="chat-messages" id="chat-log" aria-live="polite">
      <div class="chat-welcome">
        <div class="welcome-icon">&#9752;</div>
        <h2>Minecraft Pilot 已就位</h2>
        <p>输入问题即可开始，比如：</p>
      </div>
    </div>

    <div class="suggested-questions" id="suggested-questions">
      <button class="suggest-chip" data-prompt="附魔金苹果的配方是？">附魔金苹果的配方是？</button>
      <button class="suggest-chip" data-prompt="介绍一下亮度机制">介绍一下亮度机制</button>
      <button class="suggest-chip" data-prompt="苍白橡木在哪里获得？">苍白橡木在哪里获得？</button>
      <button class="suggest-chip" data-prompt="鞘翅怎么获得？">鞘翅怎么获得？</button>
    </div>

    <div class="chat-input-bar">
      <form id="chat-form" class="chat-form" autocomplete="off">
        <div class="input-wrapper">
          <textarea
            id="pilot-input"
            name="message"
            placeholder="输入问题…"
            rows="1"
            autofocus
          ></textarea>
          <div class="context-indicator" id="context-indicator" title="">
            <svg width="36" height="36" viewBox="0 0 36 36">
              <circle cx="18" cy="18" r="14" fill="none"
                stroke="var(--gray-800)" stroke-width="3" />
              <circle cx="18" cy="18" r="14" fill="none"
                stroke="var(--accent)" stroke-width="3"
                stroke-linecap="round"
                stroke-dasharray="0 88"
                id="context-circle"
                transform="rotate(-90 18 18)" />
            </svg>
            <span class="context-label" id="context-label">0%</span>
          </div>
          <button type="submit" id="send-btn" aria-label="发送消息">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </form>
      <p class="disclaimer">Minecraft Pilot 使用 DeepSeek API。AI 回答可能不准确，请核实关键信息。</p>
    </div>
  </main>
</div>

<div id="death-toast" class="death-toast" hidden aria-live="assertive">
  <strong>死亡事件</strong>
  <span id="death-text"></span>
</div>
{% endblock %}
{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script type="module" src="{{ url_for('static', path='/js/chat.js') }}"></script>
{% endblock %}
